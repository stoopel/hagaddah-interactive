<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הגדה אינטראקטיבית | Interactive Haggadah</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="js-dos.css">
</head>
<body>
  <div id="splash-screen">
    <div class="splash-content">
      <h1 class="splash-title">הגדה אינטראקטיבית</h1>
      <h2 class="splash-subtitle">Interactive Haggadah</h2>
      <button id="splash-start-btn" onclick="startGame()">▶ התחל משחק / Play</button>
    </div>
  </div>

  <div id="loading-area" style="display:none; position:fixed; z-index:99; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; text-align: center; color: white;">
    <p id="loading-label">מוריד נתונים... / Downloading...</p>
    <div id="progress-track"><div id="progress-bar"></div></div>
    <p id="progress-text">0%</p>
  </div>

  <div id="game-area">
    <div id="controls-bar">
      <span id="status-text">מוכן / Ready</span>
      <span id="mouse-hint" style="display:none; color:#f0c96a; font-size:0.78rem">🖱️ לחץ על המסך לנעילת עכבר / Click game to capture mouse — Ctrl+F10 to release</span>
      <button id="lock-btn" onclick="lockMouseOnly()" style="display:none">🖱️ נעל עכבר / Lock Mouse</button>
      <button id="save-state-btn" onclick="saveState()" style="display:none; background:rgba(80,200,120,0.2); border:1px solid #50c878; color:#50c878; padding:0.25rem 0.7rem; border-radius:6px; cursor:pointer; font-size:0.78rem; font-family:inherit">💾 Save State</button>
      <button id="load-state-btn" onclick="document.getElementById('state-file-input').click()" style="display:none; background:rgba(100,160,255,0.2); border:1px solid #64a0ff; color:#64a0ff; padding:0.25rem 0.7rem; border-radius:6px; cursor:pointer; font-size:0.78rem; font-family:inherit">📂 Load State</button>
      <input type="file" id="state-file-input" accept=".state,.bin" style="display:none" onchange="loadStateFromFile(this)">
      <button id="fs-btn" onclick="goFullscreen()">⛶ מסך מלא / Fullscreen</button>
    </div>
    <div id="jsdos-container" dir="ltr"></div>
  </div>

  <script src="js-dos.js"></script>
  <script>
    let gameCi = null;
    const CHUNKS = 12;

    // ══ CAPTURE INTERNAL ENGINE ════════════════════════════════════════════
    // We must capture the internal CI to send backend events like 'hand_savestate'
    (function watchEmulators() {
      let _val = window.emulators;
      function applyDosboxPatch(emuObj) {
        if (!emuObj || emuObj.__patched) return;
        emuObj.__patched = true;
        Object.keys(emuObj).forEach(key => {
          if (typeof emuObj[key] === 'function' && key !== '__patched') {
            const _orig = emuObj[key];
            emuObj[key] = async function(...args) {
              const ci = await _orig.apply(this, args);
              if (ci && !window._capturedCi) {
                window._capturedCi = ci;
              }
              return ci;
            };
          }
        });
      }
      if (_val) applyDosboxPatch(_val);
      try {
        Object.defineProperty(window, 'emulators', {
          configurable: true,
          get() { return _val; },
          set(newVal) { _val = newVal; applyDosboxPatch(newVal); }
        });
      } catch(e) {}
    })();

    // Number of chunks hagaddah.jsdos was split into
    const CHUNKS = 12;

    async function startGame() {
      const btn = document.getElementById('splash-start-btn');
      const splash = document.getElementById('splash-screen');
      const loadingArea = document.getElementById('loading-area');
      if (btn) btn.style.display = 'none';
      if (splash) splash.style.opacity = '0.5';
      loadingArea.style.display = 'block';

      try {
        // Fetch all chunks and merge them
        const parts = [];
        let totalLoaded = 0;

        for (let i = 0; i < CHUNKS; i++) {
          const idx = String(i).padStart(2, '0');
          updateProgress(
            Math.round((i / CHUNKS) * 85),
            `מוריד חלק ${i+1}/${CHUNKS}... / Downloading part ${i+1}/${CHUNKS}...`
          );

          const res = await fetch(`hagaddah.part${idx}`);
          if (!res.ok) throw new Error(`Chunk ${idx}: HTTP ${res.status}`);
          const buf = await res.arrayBuffer();
          parts.push(new Uint8Array(buf));
          totalLoaded += buf.byteLength;
        }

        updateProgress(90, 'ממזג... / Merging...');
        const totalLen = parts.reduce((s, c) => s + c.length, 0);
        const merged = new Uint8Array(totalLen);
        let offset = 0;
        for (const c of parts) { merged.set(c, offset); offset += c.length; }

        updateProgress(95, 'מאתחל... / Initializing...');
        const blob = new Blob([merged], { type: 'application/zip' });
        const blobUrl = URL.createObjectURL(blob);

        splash.style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';

        // Initialize JS-DOS 8 using the merged blob URL
        gameCi = await Dos(document.getElementById('jsdos-container'), {
          url: blobUrl,
          emulatorFunction: 'dosbox',
          pathPrefix: 'emulators/',
          autoStart: true,
        });
        window.gameCi = gameCi; // expose globally for debugging

        document.getElementById('status-text').textContent = '▶ פועל / Running';
        document.getElementById('mouse-hint').style.display = 'inline';
        document.getElementById('lock-btn').style.display = 'inline';
        
        loadingArea.style.display = 'none';
      } catch (err) {
        console.error(err);
        document.getElementById('loading-label').textContent = '❌ ' + err.message;
        if (btn) {
            btn.textContent = '🔄 נסה שוב / Retry';
            btn.style.display = 'inline-block';
        }
        loadingArea.style.display = 'block';
      }
    }

    function updateProgress(pct, label) {
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-text').textContent = pct + '%';
      document.getElementById('loading-label').textContent = label;
    }

    function goFullscreen() {
      const container = document.getElementById('jsdos-container');
      const canvas = container.querySelector('canvas');
      if (container.requestFullscreen) {
        container.requestFullscreen().then(() => {
          if (canvas && canvas.requestPointerLock) canvas.requestPointerLock();
        }).catch(console.warn);
      } else if (canvas && canvas.requestPointerLock) {
        canvas.requestPointerLock();
      }
    }

    function lockMouseOnly() {
      const canvas = document.querySelector('#jsdos-container canvas');
      if (canvas && canvas.requestPointerLock) canvas.requestPointerLock();
    }

    document.addEventListener('pointerlockchange', () => {
      const hint = document.getElementById('mouse-hint');
      const container = document.getElementById('jsdos-container');
      if (document.pointerLockElement) {
        container.classList.add('mouse-locked');
        if (hint) hint.textContent = '🖱️ עכבר נעול — Esc לביטול / Mouse locked — Esc to release';
      } else {
        container.classList.remove('mouse-locked');
        if (hint) hint.textContent = '🖱️ לחץ על המסך לנעילת עכבר / Click game to capture mouse — Ctrl+F10 to release';
      }
    });
    // Removed window.onload auto-start so user can click to satisfy audio policies


  </script>
</body>
</html>
